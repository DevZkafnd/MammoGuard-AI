version: "3.8"
services:
  mongodb:
    image: mongo:latest
    container_name: mammoguard_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin_medis
      MONGO_INITDB_ROOT_PASSWORD: password_lokal_123
      MONGO_INITDB_DATABASE: mammoguard_db
    ports:
      - "27017:27017"
    volumes:
      - mammoguard_mongo_data:/data/db

  backend-main:
    build:
      context: ./backend-main
    container_name: mammoguard_backend_main
    restart: always
    depends_on:
      - mongodb
      - backend-ai
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      HOST: 0.0.0.0
      PORT: 8000
      CORS_ORIGINS: http://localhost:3000
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB_NAME: mammoguard_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-too}
      JWT_ALGORITHM: HS256
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      REFRESH_COOKIE_NAME: mgu_rt
      COOKIE_SECURE: "false"
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-Admin MammoGuard}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@mammoguard.id}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-Admin@12345}
      BOOTSTRAP_ADMIN_SPECIALIZATION: ${BOOTSTRAP_ADMIN_SPECIALIZATION:-System Administrator}
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-https://example-account.r2.cloudflarestorage.com}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-replace-me}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-replace-me}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-mammoguard-storage}
      R2_REGION: ${R2_REGION:-auto}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-https://cdn.example.com}
      PRESIGNED_UPLOAD_EXPIRES_SECONDS: 900
      PRESIGNED_DOWNLOAD_EXPIRES_SECONDS: 300
      BACKEND_AI_URL: http://backend-ai:8001
      BACKEND_AI_TIMEOUT_SECONDS: 60
    ports:
      - "8000:8000"

  backend-ai:
    build:
      context: ./backend-ai
    container_name: mammoguard_backend_ai
    restart: always
    environment:
      HOST: 0.0.0.0
      PORT: 8001
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-https://example-account.r2.cloudflarestorage.com}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-replace-me}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-replace-me}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-mammoguard-storage}
      R2_REGION: ${R2_REGION:-auto}
    ports:
      - "8001:8001"

volumes:
  mammoguard_mongo_data:
