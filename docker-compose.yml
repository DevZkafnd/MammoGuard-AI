services:
  # MongoDB Database
  mongodb:
    image: mongo:8.2
    container_name: mammoguard_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin_medis
      MONGO_INITDB_ROOT_PASSWORD: password_lokal_123
      MONGO_INITDB_DATABASE: mammoguard_db
    ports:
      - "27019:27017"
    volumes:
      - mammoguard_mongo_data:/data/db
      - mammoguard_mongo_config:/data/configdb
    networks:
      - mammoguard_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mammoguard_backend
    restart: unless-stopped
    environment:
      - MONGODB_URL=mongodb://admin_medis:password_lokal_123@mongodb:27017
      - NAMA_DATABASE=mammoguard_db
      - JALUR_MODEL=./storage/models/ResNetDemo_1782708575_9063396e.pth
      - HOST=0.0.0.0
      - PORT=8000
      # ============================================
      # CLOUDFLARE R2 STORAGE CONFIGURATION
      # ============================================
      # Credentials R2 dibaca otomatis dari backend/.env (via python-dotenv),
      # yang di-mount ke container lewat volume "./backend:/app" di bawah.
      # Tutorial setup: lihat SETUP-R2-CLOUDFLARE.md
      #
      # Jika R2_ACCOUNT_ID kosong/tidak diisi di backend/.env, sistem akan
      # otomatis pakai local storage. Local storage path: ./backend/storage/
    ports:
      - "8000:8000"
    volumes:
      - mammoguard_storage:/app/storage
      - ./backend/.env:/app/.env:ro
    networks:
      - mammoguard_network
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/kesehatan"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: mammoguard_frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    networks:
      - mammoguard_network
    depends_on:
      - backend

networks:
  mammoguard_network:
    driver: bridge

volumes:
  mammoguard_mongo_data:
  mammoguard_mongo_config:
  mammoguard_storage:
